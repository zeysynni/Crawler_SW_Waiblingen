# Weekly crawl pipeline — crawl4ai version (deterministic, no LLM).
# Runs on a SCHEDULE or manually (Build → Pipelines → New pipeline,
# optional variable SECTIONS="kontakt,Privatkunden_Strom" for a subset).
#
# Required CI/CD variable (Settings → CI/CD → Variables), MASKED:
#   AIGATEWAY_KEY   — knowledge-base upload
# (OPENAI_API_KEY is no longer needed — there is no LLM in this pipeline.)

stages:
  - crawl

crawl:
  stage: crawl
  # Ubuntu + all browser OS libraries; Python via uv, browser installed below.
  image: mcr.microsoft.com/playwright:v1.61.1-noble
  timeout: 1h
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
  variables:
    UV_NO_PROGRESS: "1"
  before_script:
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - uv sync --frozen
    # crawl4ai drives Python-playwright; install its chromium (OS libs are in the image)
    - uv run playwright install chromium
  script:
    - uv run python main.py ${SECTIONS:+--sections $SECTIONS} --upload
  cache:
    key: upload-state
    paths:
      - upload_state.json
  artifacts:
    name: "crawl-$CI_PIPELINE_IID"
    when: always
    paths:
      - outputs/
      - upload_state.json
    expire_in: 30 days
