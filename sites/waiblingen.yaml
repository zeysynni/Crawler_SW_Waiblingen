# Crawl allowlist for stadtwerke-waiblingen.de — pages NOT listed here are
# not crawled.
#
# Each section: the base page (path relative to root_url; optional `url`
# override when the display path is not the real URL) plus the sub-pages to
# crawl from there, named by their visible link text on the base page
# (exact match, else unique prefix, else unique substring).

root_url: https://www.stadtwerke-waiblingen.de

sections:
  # ---- Privatkunden ----
  - path: Privatkunden/Strom
    subpages:
      - Ökostromtarif
      - Wärmestrom
      - Grundversorgung
      - Preisinformation
      - Stromkennzeichnung

  - path: Privatkunden/Erdgas
    subpages:
      - Zur Grundversorgung

  - path: Privatkunden/Trinkwasser

  - path: Privatkunden/Waerme
    subpages:
      - Fernwärme
      - Mobile Heizzentralen mieten

  - path: Privatkunden/E-Mobilitaet
    # "Anmeldung E-Ladestation" lives under Netze/Stromnetz (see below)

  - path: Privatkunden/Baeder

  - path: Privatkunden/Service
    subpages:
      - Zählerstand mitteilen
      - Umzugsservice
      - Abrechnung & Zahlung
      - Abschläge berechnen & verstehen
      - Energiesparen
      - Warnung vor Betrugsversuchen

  # ---- Geschäftskunden ----
  - path: Geschäftskunden/Strom
    subpages:
      - Grundversorgung
      - Preisinformation
      - Stromkennzeichnung

  - path: Geschäftskunden/Erdgas
    subpages:
      - Grundversorgung

  - path: Geschäftskunden/Wasser

  - path: Geschäftskunden/Waerme
    subpages:
      - Fernwärme
      - Mobile Heizzentralen mieten

  - path: Geschäftskunden/Dienstleistungen
    subpages:
      - Energielieferung Strom und Gas
      - E-Mobilität - bei der NEW
      # Photovoltaik-Anlagen links to external new-waiblingen.de — skipped
      - Glasfaseranschluss

  - path: Geschäftskunden/Service
    subpages:
      - Zählerstand mitteilen
      - Abrechnung & Zahlung

  # ---- Netze ----
  - path: Netze/Uebersicht-Netze

  - path: Netze/Stromnetz
    subpages:
      - Anmeldung E-Ladestation
      - Netzanschluss
      - Netzzugang & Verträge
      - Netznutzungsentgelte
      - Netzstrukturdaten
      - Grund- & Ersatzversorgung
      - EEG & Einspeiser

  - path: Netze/Gasnetz
    subpages:
      - Netzanschluss
      - Netzzugang & Verträge
      - Netznutzungsentgelte
      - Netzstrukturdaten
      - Grund- & Ersatzversorgung

  - path: Netze/Wassernetz

  - path: Netze/Glasfasernetz

  - path: Netze/Messstellenbetrieb

  - path: Netze/Planauskunft
    # "Zur Planauskunft" is an external web-form portal — no KB content, skipped

  # ---- standalone ----
  # `path` names the output file & hierarchy; optional `url` overrides where
  # to fetch (relative to root_url) when the path is not the real URL.
  - path: Unternehmen
  - path: Karriere
  - path: Aktuelles
  - path: Störung
    url: notfallnummern      # /Störung is a 404; the nav's Störung button -> /notfallnummern
  - path: Kontakt
  # Kundenportal (privatkundenportal.net) is an external login app — nothing
  # crawlable. Provided as the hand-written static/Kundenportal.md instead,
  # which the pipeline copies into the clean outputs and uploads like any page.
